name: Publish icon-generator

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish packages/icon-generator to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set package version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
        working-directory: packages/icon-generator

      - name: Build package
        run: pnpm --dir packages/icon-generator run build

      - name: Check package contents
        run: pnpm --dir packages/icon-generator run pack:dry-run

      - name: Publish package
        run: npm publish --access public
        working-directory: packages/icon-generator
